<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background subtle glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0" />
    </radialGradient>

    <!-- Core Blue Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="secondaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="50%" stop-color="#183b70" />
      <stop offset="100%" stop-color="#2a5298" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <!-- Glow/Neon Gradient -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38ef7d" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#11998e" stop-opacity="0.8" />
    </linearGradient>

    <!-- Drop Shadows for 3D depth -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="shadowFilter" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Glowing Backdrop Layer -->
  <circle cx="256" cy="256" r="220" fill="url(#bgGlow)" />

  <!-- The Hexagonal Outer Ring (Integraded Network Boundary) -->
  <polygon points="256,40 442,148 442,364 256,472 70,364 70,148" 
           fill="none" 
           stroke="url(#secondaryGrad)" 
           stroke-width="12" 
           stroke-linejoin="round"
           opacity="0.5" />

  <!-- Inner glowing connecting lines of the workspace network -->
  <path d="M 256,40 L 256,150 M 442,148 L 340,208 M 442,364 L 340,304 M 256,472 L 256,362 M 70,364 L 172,304 M 70,148 L 172,208" 
        stroke="url(#accentGrad)" 
        stroke-width="3" 
        stroke-dasharray="8,6" 
        opacity="0.4" />

  <!-- Core Geometric Workspace Symbol (Interlocking 'I' and 'W') -->
  <g filter="url(#shadowFilter)">
    <!-- Right overlapping facet of the main crystal -->
    <path d="M 256,150 L 370,216 L 370,348 L 256,414 Z" 
          fill="url(#primaryGrad)" 
          opacity="0.85" />

    <!-- Left overlapping facet -->
    <path d="M 256,150 L 142,216 L 142,348 L 256,414 Z" 
          fill="url(#accentGrad)" 
          opacity="0.9" />

    <!-- Top floating diamond cap (represents Workspace Platform) -->
    <path d="M 256,84 L 342,134 L 256,184 L 170,134 Z" 
          fill="#ffffff" 
          opacity="0.95" 
          filter="url(#glowFilter)" />

    <!-- Nested inner futuristic core (representing Agent Core/Brain) -->
    <polygon points="256,190 320,227 320,300 256,337 192,300 192,227" 
             fill="url(#secondaryGrad)" 
             stroke="#00f2fe" 
             stroke-width="4" 
             filter="url(#glowFilter)" />

    <!-- Glowing center energy node -->
    <circle cx="256" cy="263" r="16" fill="#ffffff" filter="url(#glowFilter)" />
    <circle cx="256" cy="263" r="6" fill="#00f2fe" />
  </g>

  <!-- Accent Orbit Rings (representing multiplatform & multi-agent environment) -->
  <circle cx="256" cy="263" r="130" 
          fill="none" 
          stroke="url(#primaryGrad)" 
          stroke-width="1.5" 
          stroke-dasharray="10,250" 
          stroke-linecap="round" 
          filter="url(#glowFilter)">
    <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 256 263" 
        to="360 256 263" 
        dur="12s" 
        repeatCount="indefinite" />
  </circle>

  <circle cx="256" cy="263" r="160" 
          fill="none" 
          stroke="url(#accentGrad)" 
          stroke-width="2" 
          stroke-dasharray="15,300" 
          stroke-linecap="round" 
          filter="url(#glowFilter)">
    <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="360 256 263" 
        to="0 256 263" 
        dur="18s" 
        repeatCount="indefinite" />
  </circle>
</svg>
